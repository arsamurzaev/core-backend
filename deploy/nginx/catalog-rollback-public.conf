# Публичный rollback на Nginx.
#
# Это не основной production-путь. Используй этот файл только если Caddy нужно
# временно выключить. Кастомные домены в rollback-режиме не автоматизируются:
# для каждого такого домена нужен отдельный сертификат и отдельный server block.

limit_conn_zone $binary_remote_addr zone=addr:10m;

upstream backend_server {
    server 127.0.0.1:4000;
    keepalive 32;
}

upstream frontend_server {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream admin_frontend_server {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name myctlg.ru *.myctlg.ru api.myctlg.ru shtab.myctlg.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shtab.myctlg.ru;

    ssl_certificate     /etc/ssl/certs/myctlg.ru.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/myctlg.ru.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    client_max_body_size 25m;
    limit_conn addr 100;

    location /internal/ {
        return 404;
    }

    location ~ ^/_svc_api/(cart/current/sse|cart/public/[^/]+/sse|s3/images/queue/[^/]+/stream)$ {
        rewrite ^/_svc_api/?(.*)$ /$1 break;
        proxy_pass http://backend_server;
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Accel-Buffering "no" always;
        gzip off;
    }

    location /_svc_api/ {
        rewrite ^/_svc_api/?(.*)$ /$1 break;
        proxy_pass http://backend_server;
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_request_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://admin_frontend_server;
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.myctlg.ru;

    ssl_certificate     /etc/ssl/certs/myctlg.ru.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/myctlg.ru.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    client_max_body_size 25m;
    limit_conn addr 100;

    set $fwd_host $host;
    if ($http_origin ~* "^https?://([^/]+)") {
        set $fwd_host $1;
    }

    location /internal/ {
        return 404;
    }

    location ~ ^/(cart/current/sse|cart/public/[^/]+/sse|s3/images/queue/[^/]+/stream)$ {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $fwd_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Accel-Buffering "no" always;
        gzip off;
    }

    location / {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $fwd_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_request_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

