# Log rotation for catalog backend JSON logs.
# Alloy tails this file — copytruncate keeps the inode in place so the tail is not broken.
#
# Install: sudo cp ops/logrotate/catalog-backend.conf /etc/logrotate.d/catalog-backend
# Test:    sudo logrotate --debug /etc/logrotate.d/catalog-backend
#
# Replace /path/to/project with the actual absolute path on the server.

/path/to/project/runtime/logs/backend.jsonl {
    daily
    rotate 14
    compress
    delaycompress
    copytruncate
    notifempty
    missingok
    maxsize 100M
}
