user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Buffers & timeouts ─────────────────────────────────────────────────────
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    client_max_body_size 20m;
    large_client_header_buffers 4 8k;
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/plain
        text/css
        text/javascript
        image/svg+xml;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    # Global: 20 req/s per IP (burst 50)
    limit_req_zone $binary_remote_addr zone=global:10m rate=20r/s;
    # Auth: 1 req/s per IP (burst 5, no delay)
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=1r/s;
    # API public: 30 req/s per IP
    limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/s;

    # Connection limit: max 100 simultaneous connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    limit_req_status 429;
    limit_conn_status 429;

    # ── Bad bots & scanners ────────────────────────────────────────────────────
    map $http_user_agent $bad_bot {
        default 0;
        ~*masscan        1;
        ~*zgrab          1;
        ~*nikto          1;
        ~*nmap           1;
        ~*sqlmap         1;
        ~*python-requests 1;
        ~*go-http-client 1;
        ~*libwww-perl    1;
        ~*curl/[0-6]     1;
        ""               1;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — API backend ────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.example.com;  # ← замени на свой домен

        # SSL — Let's Encrypt (certbot)
        ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/api.example.com/chain.pem;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        ssl_stapling on;
        ssl_stapling_verify on;

        # ── Security headers ───────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

        # Block bad bots
        if ($bad_bot) { return 444; }

        # Connection limit
        limit_conn conn_limit 50;

        # ── Auth endpoints — strict rate limit ─────────────────────────────────
        location ~* ^/(auth/login|.*/auth/login) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_log_level warn;

            proxy_pass http://127.0.0.1:4000;
            include /etc/nginx/proxy_params;
        }

        # ── Metrics — allow only from localhost / private net ──────────────────
        location /metrics {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://127.0.0.1:4000;
            include /etc/nginx/proxy_params;
        }

        # ── Swagger — allow only in dev / close in prod ────────────────────────
        location /docs {
            # Раскомментируй в production:
            # allow 10.0.0.0/8;
            # deny all;

            proxy_pass http://127.0.0.1:4000;
            include /etc/nginx/proxy_params;
        }

        # ── All other API routes ───────────────────────────────────────────────
        location / {
            limit_req zone=global burst=50 nodelay;

            proxy_pass http://127.0.0.1:4000;
            include /etc/nginx/proxy_params;
        }
    }

    # ── HTTPS — Frontend ───────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name example.com www.example.com;  # ← замени на свой домен

        ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        if ($bad_bot) { return 444; }
        limit_conn conn_limit 30;

        root /var/www/frontend;
        index index.html;

        location / {
            limit_req zone=api burst=100 nodelay;
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
