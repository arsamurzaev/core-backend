apiVersion: 1

groups:
  - orgId: 1
    name: backend-application
    folder: General
    interval: 1m
    rules:
      - uid: backend-http-5xx
        title: Backend 5xx rate high
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: mimir
            model:
              datasource:
                type: prometheus
                uid: mimir
              editorMode: code
              expr: sum(rate(catalog_backend_http_requests_total{status_class="5xx"}[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.1
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "-100"
              hide: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: Backend is returning sustained 5xx responses.
        labels:
          severity: critical
          component: http
          stack: observability
        isPaused: false

      - uid: backend-http-p95
        title: Backend p95 latency high
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: mimir
            model:
              datasource:
                type: prometheus
                uid: mimir
              editorMode: code
              expr: histogram_quantile(0.95, sum(rate(catalog_backend_http_request_duration_seconds_bucket[5m])) by (le))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "-100"
              hide: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Alerting
        for: 10m
        annotations:
          summary: Backend p95 latency is above 1 second.
        labels:
          severity: warning
          component: http
          stack: observability
        isPaused: false

      - uid: backend-prisma-slow
        title: Prisma slow queries detected
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              datasource:
                type: prometheus
                uid: mimir
              editorMode: code
              expr: increase(catalog_backend_prisma_slow_queries_total[10m])
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "-100"
              hide: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Alerting
        for: 0s
        annotations:
          summary: Prisma reported at least one slow query in the last 10 minutes.
        labels:
          severity: warning
          component: database
          stack: observability
        isPaused: false

      - uid: backend-auth-failures
        title: Auth login failures burst
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              datasource:
                type: prometheus
                uid: mimir
              editorMode: code
              expr: sum(increase(catalog_backend_auth_events_total{action="login",outcome="failure"}[10m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params:
                      - 5
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "-100"
              hide: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: Login failures exceeded 5 attempts in the last 10 minutes.
        labels:
          severity: warning
          component: auth
          stack: observability
        isPaused: false

  - orgId: 1
    name: backend-operations
    folder: General
    interval: 1m
    rules:
      - uid: backend-cron-errors
        title: Cron failures detected
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: mimir
            model:
              datasource:
                type: prometheus
                uid: mimir
              editorMode: code
              expr: increase(catalog_backend_cron_runs_total{status="error"}[15m])
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "-100"
              hide: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Alerting
        for: 0s
        annotations:
          summary: At least one cron execution failed in the last 15 minutes.
        labels:
          severity: critical
          component: cron
          stack: observability
        isPaused: false

      - uid: backend-queue-errors
        title: Queue failures detected
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: mimir
            model:
              datasource:
                type: prometheus
                uid: mimir
              editorMode: code
              expr: increase(catalog_backend_queue_jobs_total{status="error"}[15m])
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "-100"
              hide: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Alerting
        for: 0s
        annotations:
          summary: At least one BullMQ job failed in the last 15 minutes.
        labels:
          severity: critical
          component: queue
          stack: observability
        isPaused: false

      - uid: backend-cache-errors
        title: Cache operation errors detected
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: mimir
            model:
              datasource:
                type: prometheus
                uid: mimir
              editorMode: code
              expr: increase(catalog_backend_cache_operations_total{outcome="error"}[15m])
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "-100"
              hide: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Alerting
        for: 0s
        annotations:
          summary: Cache operations are returning errors.
        labels:
          severity: warning
          component: cache
          stack: observability
        isPaused: false
