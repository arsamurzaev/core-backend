apiVersion: 1

datasources:
 - name: Mimir
   uid: mimir
   type: prometheus
   access: proxy
   url: http://mimir:9009/prometheus
   isDefault: true
   editable: false
   jsonData:
    httpMethod: POST

 - name: Loki
   uid: loki
   type: loki
   access: proxy
   url: http://loki:3100
   editable: false
   jsonData:
    maxLines: 1000

 - name: Tempo
   uid: tempo
   type: tempo
   access: proxy
   url: http://tempo:3200
   editable: false
   jsonData:
    nodeGraph:
     enabled: true
    serviceMap:
     datasourceUid: mimir
