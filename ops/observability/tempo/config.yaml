server:
 http_listen_port: 3200
 log_level: info

distributor:
 receivers:
  otlp:
   protocols:
    grpc:
     endpoint: 0.0.0.0:4317
    http:
     endpoint: 0.0.0.0:4318

ingester:
 max_block_duration: 5m
 lifecycler:
  address: 127.0.0.1
  ring:
   kvstore:
    store: inmemory
   replication_factor: 1

overrides:
 defaults:
  metrics_generator:
   processors: [service-graphs, span-metrics]
   generate_native_histograms: both

compactor:
 compaction:
  block_retention: 168h

metrics_generator:
 registry:
  external_labels:
   source: tempo
   service: catalog_backend
 storage:
  path: /var/tempo/generator/wal
  remote_write:
   - url: http://mimir:9009/api/v1/push
     send_exemplars: true

storage:
 trace:
  backend: local
  wal:
   path: /var/tempo/wal
  local:
   path: /var/tempo/blocks
