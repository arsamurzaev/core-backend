server {
    listen 80;
    listen [::]:80;
    server_name myctlg.ru *.myctlg.ru *.test.myctlg.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name myctlg.ru *.myctlg.ru *.test.myctlg.ru;

    ssl_certificate     /etc/ssl/certs/myctlg.ru.crt;
    ssl_certificate_key /etc/ssl/private/myctlg.ru.key;
    # Нужен для OCSP stapling — цепочка CA без конечного сертификата
    ssl_trusted_certificate /etc/ssl/certs/myctlg.ru.chain.pem;

    # Подавляем заголовки от Next.js, чтобы не дублировались
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;

    # Security headers — единственный источник истины
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # Общие proxy-заголовки
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Лимит соединений на IP
    limit_conn addr 100;

    # Auth — строгий лимит на login и handoff (5 req/min на IP)
    location ~ ^/api/(auth/login|auth/handoff|catalog/auth/login)$ {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        rewrite ^/api(.+)$ $1 break;
        proxy_pass http://backend_server;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # SSE endpoints — отключаем буферизацию
    location ~ ^/api/(cart/current/sse|cart/public/[^/]+/sse|s3/images/queue/[^/]+/stream)$ {
        rewrite ^/api(.+)$ $1 break;
        proxy_pass http://backend_server;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_buffering         off;
        proxy_cache             off;
        proxy_request_buffering off;

        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;

        add_header Cache-Control     "no-cache, no-store, must-revalidate" always;
        add_header X-Accel-Buffering "no" always;

        gzip off;
    }

    # Backend API — стрипаем /api/ перед передачей бэкенду
    location /api/ {
        proxy_pass http://backend_server/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_request_buffering off;

        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # Frontend
    location / {
        proxy_pass http://frontend_server;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    180s;
        proxy_read_timeout    180s;
    }
}
