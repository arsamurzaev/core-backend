# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name myctlg-update.ru *.myctlg-update.ru api.myctlg-update.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# API — api.myctlg-update.ru
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.myctlg-update.ru;

    ssl_certificate     /etc/ssl/certs/myctlg-update.ru.crt;
    ssl_certificate_key /etc/ssl/private/myctlg-update.ru.key;
    ssl_trusted_certificate /etc/ssl/certs/myctlg-update.ru.chain.pem;

    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    limit_conn addr 100;

    # Auth — строгий лимит
    location ~ ^/(auth/login|auth/handoff|catalog/auth/login)$ {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # SSE endpoints
    location ~ ^/(cart/current/sse|cart/public/[^/]+/sse|s3/images/queue/[^/]+/stream)$ {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering         off;
        proxy_cache             off;
        proxy_request_buffering off;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
        add_header Cache-Control     "no-cache, no-store, must-revalidate" always;
        add_header X-Accel-Buffering "no" always;
        gzip off;
    }

    # Backend
    location / {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}

# Frontend — myctlg-update.ru и *.myctlg-update.ru
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name myctlg-update.ru *.myctlg-update.ru;

    ssl_certificate     /etc/ssl/certs/myctlg-update.ru.crt;
    ssl_certificate_key /etc/ssl/private/myctlg-update.ru.key;
    ssl_trusted_certificate /etc/ssl/certs/myctlg-update.ru.chain.pem;

    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    limit_conn addr 100;

    location / {
        proxy_pass http://frontend_server;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    180s;
        proxy_read_timeout    180s;
    }
}
